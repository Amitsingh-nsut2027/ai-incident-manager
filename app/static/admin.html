<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · AI Incident Manager</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; margin: 0;
           background: radial-gradient(1200px 600px at 50% -10%, #16233f 0%, #0f172a 55%); color: #e2e8f0; min-height: 100vh; }
    header { background: rgba(30,41,59,.7); backdrop-filter: blur(8px); padding: 16px 24px; font-size: 20px;
             font-weight: 800; border-bottom: 1px solid #334155; display:flex; justify-content:space-between; align-items:center; }
    header a { color:#93c5fd; font-size:14px; font-weight:600; text-decoration:none; }
    main { max-width: 820px; margin: 0 auto; padding: 24px; }
    table { width:100%; border-collapse:collapse; background:#1e293b; border-radius:12px; overflow:hidden; }
    th,td { text-align:left; padding:12px 14px; border-bottom:1px solid #334155; font-size:14px; }
    th { color:#94a3b8; }
    select { padding:7px 10px; border-radius:8px; background:#0b1220; color:#e2e8f0; border:1px solid #475569; }
    button { padding:7px 14px; background:#3b82f6; color:#fff; border:none; border-radius:8px; font-weight:700; cursor:pointer; }
    button:hover { background:#2563eb; }
    .pill { font-size:11px; font-weight:800; padding:3px 9px; border-radius:999px; }
    .admin{background:#5b21b6;color:#ddd6fe}.engineer{background:#1e40af;color:#bfdbfe}.viewer{background:#334155;color:#cbd5e1}
    #login { max-width:360px; margin:70px auto; background:#1e293b; padding:28px; border-radius:14px; border:1px solid #334155; }
    #login input { width:100%; margin:8px 0; padding:10px; border-radius:8px; background:#0b1220; color:#e2e8f0; border:1px solid #475569; }
    .err { color:#f87171; }
    #toasts { position:fixed; bottom:20px; right:20px; display:flex; flex-direction:column; gap:8px; }
    .toast { background:#1e293b; border:1px solid #3b82f6; padding:12px 16px; border-radius:10px; font-size:14px; }
  </style>
</head>
<body>
  <div id="toasts"></div>
  <header>
    <span>👑 Admin · Users</span>
    <span><a href="/analyze">🔍 Analyzer</a> &nbsp;·&nbsp; <a href="/dashboard">📊 Dashboard</a> &nbsp;·&nbsp; <a onclick="localStorage.removeItem('token');location.href='/admin'" style="cursor:pointer;">🚪 Log out</a></span>
  </header>

  <div id="login">
    <h2>Log in</h2>
    <input id="email" placeholder="email" />
    <input id="password" type="password" placeholder="password" />
    <button onclick="login()" style="width:100%;margin-top:8px;">Log in</button>
    <p class="err" id="loginErr"></p>
  </div>

  <main id="app" style="display:none;">
    <p style="color:#94a3b8">Manage user roles. <b>viewer</b> = read-only · <b>engineer</b> = create/analyze · <b>admin</b> = full control.</p>
    <table><thead><tr><th>ID</th><th>Email</th><th>Current</th><th>Set role</th><th></th></tr></thead>
      <tbody id="rows"></tbody></table>
    <p class="err" id="note"></p>
  </main>

  <script>
    let token = localStorage.getItem("token");
    const $=id=>document.getElementById(id);
    function toast(m){ const t=document.createElement("div"); t.className="toast"; t.textContent=m;
      $("toasts").appendChild(t); setTimeout(()=>t.remove(),2600); }

    async function login(){
      const body=new URLSearchParams({username:$("email").value,password:$("password").value});
      const res=await fetch("/auth/login",{method:"POST",body});
      if(!res.ok){$("loginErr").textContent="Login failed";return;}
      token=(await res.json()).access_token; localStorage.setItem("token",token); load();
    }

    async function load(){
      const res=await fetch("/admin/users",{headers:{"Authorization":"Bearer "+token}});
      if(res.status===401){ localStorage.removeItem("token"); location.reload(); return; }
      if(res.status===403){ $("login").style.display="none"; $("app").style.display="block";
        $("note").textContent="⛔ You are not an admin. Ask an admin to promote your account."; return; }
      $("login").style.display="none"; $("app").style.display="block";
      const users=await res.json();
      $("rows").innerHTML=users.map(u=>`<tr>
        <td>${u.id}</td><td>${u.email}</td>
        <td><span class="pill ${u.role}">${u.role}</span></td>
        <td><select id="r${u.id}">
          ${["viewer","engineer","admin"].map(r=>`<option ${r===u.role?"selected":""}>${r}</option>`).join("")}
        </select></td>
        <td><button onclick="save(${u.id})">Save</button></td></tr>`).join("");
    }

    async function save(id){
      const role=$("r"+id).value;
      const res=await fetch(`/admin/users/${id}/role`,{method:"PATCH",
        headers:{"Authorization":"Bearer "+token,"Content-Type":"application/json"},
        body:JSON.stringify({role})});
      if(res.ok){ toast(`Updated user #${id} → ${role} ✅`); load(); }
      else toast(`Failed (HTTP ${res.status})`);
    }

    if(token) load();
  </script>
</body>
</html>
