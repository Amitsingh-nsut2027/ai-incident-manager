<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Incident Analyzer</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; margin: 0;
           background: radial-gradient(1200px 600px at 50% -10%, #16233f 0%, #0f172a 55%); color: #e2e8f0; min-height: 100vh; }
    /* top progress bar */
    #topbar { position:fixed; top:0; left:0; height:3px; width:0; background:linear-gradient(90deg,#22c55e,#3b82f6,#a855f7);
              z-index:50; transition:width .4s ease; box-shadow:0 0 8px #3b82f6; }
    header { background: rgba(30,41,59,.7); backdrop-filter: blur(8px); padding: 16px 24px;
             font-size: 20px; font-weight: 800; border-bottom: 1px solid #334155;
             display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:5; }
    header a { color:#93c5fd; font-size:14px; font-weight:600; text-decoration:none; }
    main { max-width: 880px; margin: 0 auto; padding: 24px; }
    .sub { color: #94a3b8; margin: 4px 0 18px; }
    textarea { width: 100%; min-height: 170px; padding: 14px; border-radius: 12px;
               border: 1px solid #475569; background: #0b1220; color: #e2e8f0;
               font-family: ui-monospace, Menlo, monospace; font-size: 13px; transition:.2s; }
    textarea:focus { outline:none; border-color:#3b82f6; box-shadow:0 0 0 3px rgba(59,130,246,.2); }
    textarea.drop { border-color:#22c55e; box-shadow:0 0 0 3px rgba(34,197,94,.3); background:#0c1a12; }
    input { padding: 10px 12px; border-radius: 8px; border: 1px solid #475569; background: #0b1220; color: #e2e8f0; }
    button { padding: 13px 26px; background: linear-gradient(180deg,#3b82f6,#2563eb); color: white;
             border: none; border-radius: 10px; font-weight: 800; cursor: pointer; font-size: 15px; transition: transform .08s, opacity .2s; }
    button:active:not(:disabled){ transform: scale(.97); }
    button:disabled { background:#475569; cursor:not-allowed; opacity:.7; }
    .ghost { background:#1e293b; border:1px solid #334155; padding:9px 14px; font-size:13px; font-weight:600; }
    .ghost:hover { border-color:#3b82f6; }
    .row { display:flex; gap:12px; align-items:center; margin:12px 0; flex-wrap:wrap; }
    .chip { background:#1e293b; border:1px solid #334155; color:#cbd5e1; border-radius:999px;
            padding:7px 13px; font-size:13px; cursor:pointer; transition:.15s; }
    .chip:hover { border-color:#3b82f6; color:#fff; transform:translateY(-1px); }
    .hint { color:#64748b; font-size:12px; }

    /* Agent stepper */
    #steps { display:none; margin:18px 0; }
    .step { display:flex; align-items:center; gap:12px; padding:11px 14px; border-radius:10px;
            margin:7px 0; background:#111c33; border:1px solid #243049; opacity:.45; transition:.35s; cursor:help; }
    .step.active { opacity:1; border-color:#3b82f6; background:#15233f; box-shadow:0 0 0 3px rgba(59,130,246,.12); }
    .step.done { opacity:1; border-color:#14532d; }
    .step .ic { font-size:20px; width:26px; text-align:center; }
    .step .nm { font-weight:600; }
    .step .st { margin-left:auto; font-size:13px; color:#64748b; }
    .step.active .st { color:#93c5fd; } .step.done .st { color:#4ade80; }
    .spin { width:15px; height:15px; border:2px solid #3b82f6; border-top-color:transparent; border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* Results */
    #result { margin-top:8px; }
    .verdict { display:flex; gap:16px; align-items:center; flex-wrap:wrap; margin:14px 0; animation:rise .4s; }
    .sev { display:inline-flex; align-items:center; justify-content:center; width:74px; height:74px; border-radius:16px; font-weight:900; font-size:20px; }
    .s1{background:#7f1d1d;color:#fecaca}.s2{background:#7c2d12;color:#fed7aa}.s3{background:#713f12;color:#fde68a}.s4{background:#14532d;color:#bbf7d0}
    .conf { flex:1; min-width:200px; }
    .bar { height:12px; background:#1e293b; border-radius:999px; overflow:hidden; margin-top:6px; }
    .bar > div { height:100%; background:linear-gradient(90deg,#22c55e,#3b82f6); width:0; transition:width 1s ease; }
    .tabs { display:flex; gap:8px; flex-wrap:wrap; margin:14px 0 0; }
    .tab { padding:9px 14px; border-radius:9px 9px 0 0; background:#16223c; border:1px solid #243049; border-bottom:none;
           cursor:pointer; font-size:13px; font-weight:600; color:#94a3b8; transition:.15s; }
    .tab.on { background:#1e293b; color:#fff; border-color:#3b82f6; }
    .tab:hover { color:#fff; }
    .panel { background:#1e293b; border:1px solid #334155; border-radius:0 12px 12px 12px; padding:18px 20px; animation:rise .35s; }
    .panel :first-child{margin-top:0} .panel :last-child{margin-bottom:0}
    @keyframes rise { from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:none} }
    .actions { display:flex; gap:10px; margin:12px 0; }

    /* History */
    #history { margin-top:30px; }
    #history h3 { color:#cbd5e1; font-size:15px; }
    .hrow { display:flex; gap:12px; align-items:center; padding:11px 14px; background:#1e293b; border:1px solid #334155;
            border-radius:10px; margin:7px 0; cursor:pointer; transition:.15s; }
    .hrow:hover { border-color:#3b82f6; transform:translateX(3px); }
    .pill { font-size:11px; font-weight:800; padding:3px 9px; border-radius:999px; }

    #login { max-width:360px; margin:70px auto; background:#1e293b; padding:28px; border-radius:14px; border:1px solid #334155; }
    #login input { width:100%; margin:8px 0; }
    .err { color:#f87171; }

    /* Toasts */
    #toasts { position:fixed; bottom:20px; right:20px; z-index:60; display:flex; flex-direction:column; gap:8px; }
    .toast { background:#1e293b; border:1px solid #3b82f6; color:#e2e8f0; padding:12px 16px; border-radius:10px;
             box-shadow:0 8px 24px rgba(0,0,0,.4); animation:toastin .3s; font-size:14px; }
    @keyframes toastin { from{opacity:0; transform:translateX(20px)} to{opacity:1; transform:none} }

    /* Light theme */
    body.light { background:#eef2f7; color:#0f172a; }
    body.light header { background:rgba(255,255,255,.85); border-color:#cbd5e1; }
    body.light textarea, body.light input { background:#fff; color:#0f172a; border-color:#cbd5e1; }
    body.light .panel, body.light .step, body.light .hrow, body.light #login { background:#fff; border-color:#cbd5e1; }
    body.light .chip, body.light .ghost { background:#fff; color:#334155; }
    body.light .tab { background:#e2e8f0; color:#475569; }
    body.light .tab.on { background:#fff; color:#0f172a; }
    body.light .sub, body.light .hint { color:#64748b; }
  </style>
</head>
<body>
  <div id="topbar"></div>
  <div id="toasts"></div>
  <header>
    <span>🛡️ AI Incident Analyzer</span>
    <span><button class="ghost" onclick="toggleTheme()" style="margin-right:10px;">🌗 Theme</button><a href="/admin" style="margin-right:14px;">👑 Admin</a><a href="/dashboard">📊 Dashboard →</a></span>
  </header>

  <div id="login">
    <h2 id="loginTitle">Log in</h2>
    <input id="email" placeholder="email" value="amit@example.com" />
    <input id="password" type="password" placeholder="password (min 8 chars)" value="supersecret123" />
    <button id="primaryBtn" onclick="submitAuth()" style="width:100%;margin-top:8px;">Log in</button>
    <p class="hint" style="margin-top:12px;text-align:center;">
      <span id="toggleText">New here?</span>
      <a id="toggleLink" onclick="toggleMode()" style="color:#60a5fa;cursor:pointer;text-decoration:underline;">Create an account</a>
    </p>
    <p class="err" id="loginErr"></p>
  </div>

  <main id="app" style="display:none;">
    <p class="sub">Paste logs (or drop a file), then hit <b>Analyze</b> — watch 7 AI agents diagnose it live. <span class="hint">Tip: ⌘/Ctrl + Enter to analyze.</span></p>
    <div class="row">
      <label>Affected service <input id="service" value="checkout" placeholder="e.g. checkout, email" style="width:170px;" /></label>
      <button class="ghost" onclick="filein.click()">📎 Upload log file</button>
      <input type="file" id="filein" accept=".log,.txt,text/*" style="display:none" />
    </div>
    <textarea id="logs">2026-06-30T02:00:01 ERROR [checkout] timeout connecting to db after 30s
2026-06-30T02:00:01 ERROR [checkout] connection pool exhausted (max=20)
2026-06-30T02:00:02 CRITICAL [payment] payment failed: checkout unavailable</textarea>
    <div class="row">
      <span class="hint">Examples:</span>
      <span class="chip" onclick="setExample('oom')">💥 memory crash</span>
      <span class="chip" onclick="setExample('disk')">💾 disk full</span>
      <span class="chip" onclick="setExample('auth')">🔑 login outage</span>
      <span class="chip" onclick="setExample('dns')">🌐 DNS failure</span>
    </div>
    <div class="row"><button id="goBtn" onclick="analyze()">🔍 Analyze Incident</button></div>

    <div id="steps"></div>
    <div id="result"></div>
    <div id="history"><h3>🕘 Recent analyses</h3><div id="hlist"></div></div>
  </main>

  <script>
    let token = localStorage.getItem("token");
    let stepTimer = null, lastReport = null, sections = [], currentId = null;
    function toggleTheme(){ document.body.classList.toggle("light");
      localStorage.setItem("theme", document.body.classList.contains("light")?"light":"dark"); }
    const AGENTS = [
      ["📥","Log Analyzer","Summarizes what the logs show"],
      ["📡","Monitoring","Detects anomalies & error spikes"],
      ["🧠","Knowledge Retrieval (RAG)","Finds relevant runbooks & past incidents"],
      ["🔍","Root Cause Analysis","Determines the most likely cause"],
      ["🚨","Severity Assessment","Assigns SEV 1-4"],
      ["🔧","Fix Recommendation","Suggests concrete fixes"],
      ["🛟","Recovery Planner","Builds a step-by-step recovery plan"],
      ["📋","Report Generator","Writes the post-mortem"],
    ];
    const EXAMPLES = {
      oom:"2026-06-30 ERROR [api] OutOfMemoryError: Java heap space\n2026-06-30 CRITICAL [api] process killed (OOM), restarting\n2026-06-30 WARN [api] memory usage 98% of 2GB limit",
      disk:"2026-06-30 ERROR [db] could not write to disk: No space left on device\n2026-06-30 CRITICAL [db] write-ahead log full, rejecting transactions\n2026-06-30 WARN [host] disk usage 100% on /var/lib",
      auth:"2026-06-30 ERROR [auth] redis connection refused\n2026-06-30 ERROR [auth] cannot validate sessions, all logins failing\n2026-06-30 CRITICAL [auth] 100% of login requests returning 500",
      dns:"2026-06-30 ERROR [gateway] DNS resolution failed for payments.internal\n2026-06-30 CRITICAL [gateway] all upstream calls timing out\n2026-06-30 WARN [gateway] 503 rate at 87%",
    };
    function setExample(k){ document.getElementById("logs").value = EXAMPLES[k]; toast("Example loaded ✨"); }
    function toast(msg){ const t=document.createElement("div"); t.className="toast"; t.textContent=msg;
      toasts.appendChild(t); setTimeout(()=>{t.style.opacity=0; t.style.transition="opacity .4s"; setTimeout(()=>t.remove(),400);},2600); }
    function bar(w){ topbar.style.width=w+"%"; }

    let authMode = "login";
    function toggleMode(){
      authMode = authMode==="login" ? "register" : "login";
      const isLogin = authMode==="login";
      document.getElementById("loginTitle").textContent = isLogin ? "Log in" : "Create account";
      document.getElementById("primaryBtn").textContent = isLogin ? "Log in" : "Sign up";
      document.getElementById("toggleText").textContent = isLogin ? "New here?" : "Already have an account?";
      document.getElementById("toggleLink").textContent = isLogin ? "Create an account" : "Log in instead";
      loginErr.textContent = "";
    }
    function submitAuth(){ authMode==="login" ? login() : register(); }

    async function login(){
      const body=new URLSearchParams({username:email.value,password:password.value});
      const res=await fetch("/auth/login",{method:"POST",body});
      if(!res.ok){loginErr.textContent="Login failed — check your email/password";return;}
      token=(await res.json()).access_token; localStorage.setItem("token",token); showApp(); toast("Welcome back! 👋");
    }

    async function register(){
      const em=email.value.trim(), pw=password.value;
      if(pw.length<8){ loginErr.textContent="Password must be at least 8 characters"; return; }
      const res=await fetch("/auth/register",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({email:em,password:pw})});
      if(res.status===201){ toast("Account created — logging you in! 🎉"); await login(); }
      else if(res.status===400){ loginErr.textContent="That email is already registered — try logging in."; }
      else if(res.status===422){ loginErr.textContent="Enter a valid email and an 8+ character password."; }
      else { loginErr.textContent="Registration failed (HTTP "+res.status+")"; }
    }
    function showApp(){ login_.style.display="none"; app.style.display="block"; loadHistory(); }

    function renderSteps(){
      steps.style.display="block";
      steps.innerHTML=AGENTS.map((a,i)=>`<div class="step" id="step${i}" title="${a[2]}">
        <span class="ic">${a[0]}</span><span class="nm">${a[1]}</span><span class="st" id="st${i}">waiting</span></div>`).join("");
    }
    function setStep(i,s){ const el=document.getElementById("step"+i),st=document.getElementById("st"+i); if(!el)return;
      el.className="step "+s; st.innerHTML = s==="active"?'<span class="spin"></span>':s==="done"?"✓ done":"waiting"; }
    function startSteps(){ let i=0; renderSteps(); setStep(0,"active"); bar(12);
      stepTimer=setInterval(()=>{ if(i<AGENTS.length-1){ setStep(i,"done"); i++; setStep(i,"active"); bar(12+i*11);} },6000); }
    function finishSteps(){ clearInterval(stepTimer); AGENTS.forEach((_,i)=>setStep(i,"done")); bar(100); setTimeout(()=>bar(0),600); }

    async function analyze(){
      const logs=document.getElementById("logs").value.trim();
      if(!logs){toast("⚠️ Paste some logs first!");return;}
      goBtn.disabled=true; result.innerHTML=""; startSteps();
      const auth={"Authorization":"Bearer "+token,"Content-Type":"application/json"};
      try{
        const c=await fetch("/incidents",{method:"POST",headers:auth,
          body:JSON.stringify({service:service.value||"service",raw_log:logs,severity:null})});
        if(c.status===401){localStorage.removeItem("token");location.reload();return;}
        const inc=await c.json();
        const res=await fetch(`/incidents/${inc.id}/analyze`,{method:"POST",headers:auth});
        if(!res.ok) throw new Error("Analysis failed (HTTP "+res.status+")");
        finishSteps(); render(await res.json()); loadHistory();
        confetti({particleCount:120, spread:75, origin:{y:.6}}); toast("Analysis complete! 🎉");
      }catch(e){ clearInterval(stepTimer); bar(0); result.innerHTML=`<p class="err">⚠️ ${e.message}</p>`; toast("⚠️ "+e.message); }
      finally{ goBtn.disabled=false; }
    }

    function render(r){
      lastReport=r; currentId=r.incident_id;
      const m=(r.severity_assessment||"").match(/SEV-([1-4])/); const sev=m?m[1]:"?";
      const conf=Math.round((r.confidence_score||0)*100); const md=t=>marked.parse(t||"_none_");
      sections=[["🔍 Root Cause",r.root_cause],["🚨 Severity",r.severity_assessment],
                ["🔧 Fix",r.recommended_fix],["🛟 Recovery",r.recovery_plan],["📋 Post-Mortem",r.post_mortem]];
      result.innerHTML=`
        <div class="verdict">
          <div class="sev s${sev}">SEV-${sev}</div>
          <div class="conf"><b>AI Confidence: ${conf}%</b><div class="bar"><div id="cbar"></div></div></div>
        </div>
        <div class="actions"><button class="ghost" onclick="copyReport()">📋 Copy</button>
          <button class="ghost" onclick="downloadReport()">⬇️ Download .md</button></div>
        <div class="tabs" id="tabs"></div>
        <div class="panel" id="panel"></div>
        <h3 style="font-size:14px;color:#93c5fd;margin:20px 0 8px;">💬 Ask a follow-up</h3>
        <div id="qa"></div>
        <div class="row">
          <input id="qInput" placeholder="e.g. How do I prevent this next time?" style="flex:1;min-width:240px;"
                 onkeydown="if(event.key==='Enter')ask()" />
          <button id="askBtn" onclick="ask()">Ask</button>
        </div>`;
      document.getElementById("tabs").innerHTML=sections.map((s,i)=>
        `<div class="tab ${i===0?'on':''}" onclick="switchTab(${i})">${s[0]}</div>`).join("");
      switchTab(0);
      setTimeout(()=>{const b=document.getElementById("cbar"); if(b)b.style.width=conf+"%";},100);
      result.scrollIntoView({behavior:"smooth"});
    }
    function switchTab(i){
      document.querySelectorAll(".tab").forEach((t,j)=>t.classList.toggle("on",j===i));
      document.getElementById("panel").innerHTML=marked.parse(sections[i][1]||"_none_");
    }

    async function ask(){
      const inp=document.getElementById("qInput"); const q=inp.value.trim();
      if(!q){toast("Type a question first");return;}
      const qa=document.getElementById("qa"), btn=document.getElementById("askBtn");
      qa.innerHTML+=`<div style="margin:10px 0 4px;"><b style="color:#93c5fd;">You:</b> ${q}</div>`;
      inp.value=""; btn.disabled=true;
      try{
        const res=await fetch(`/incidents/${currentId}/ask`,{method:"POST",
          headers:{"Authorization":"Bearer "+token,"Content-Type":"application/json"},
          body:JSON.stringify({question:q})});
        if(!res.ok) throw new Error("Ask failed (HTTP "+res.status+")");
        const d=await res.json();
        qa.innerHTML+=`<div class="panel" style="margin:4px 0;"><b style="color:#4ade80;">AI:</b> ${marked.parse(d.answer)}</div>`;
      }catch(e){ qa.innerHTML+=`<p class="err">⚠️ ${e.message}</p>`; toast("⚠️ "+e.message); }
      finally{ btn.disabled=false; }
    }

    async function deleteIncident(id){
      if(!confirm("Delete incident #"+id+"?")) return;
      const res=await fetch(`/incidents/${id}`,{method:"DELETE",headers:{"Authorization":"Bearer "+token}});
      if(res.status===403){ toast("⛔ Admins only — promote your account to delete."); return; }
      if(res.status===204){ toast("Deleted #"+id+" 🗑️"); loadHistory(); }
      else toast("Delete failed (HTTP "+res.status+")");
    }

    function reportText(){ const r=lastReport; if(!r)return "";
      return `# Incident Report\n\n## Severity\n${r.severity_assessment}\n\n## Root Cause\n${r.root_cause}\n\n## Fix\n${r.recommended_fix}\n\n## Recovery Plan\n${r.recovery_plan}\n\n## Post-Mortem\n${r.post_mortem}\n`; }
    function copyReport(){ navigator.clipboard.writeText(reportText()); toast("Report copied! 📋"); }
    function downloadReport(){ const b=new Blob([reportText()],{type:"text/markdown"}); const a=document.createElement("a");
      a.href=URL.createObjectURL(b); a.download="incident-report.md"; a.click(); toast("Downloaded ⬇️"); }

    async function loadHistory(){
      const res=await fetch("/incidents?limit=8",{headers:{"Authorization":"Bearer "+token}}); if(!res.ok)return;
      const items=await res.json();
      hlist.innerHTML=items.map(i=>{const s=i.severity||"?";
        const col={1:"#7f1d1d",2:"#7c2d12",3:"#713f12",4:"#14532d"}[i.severity]||"#334155";
        return `<div class="hrow" onclick="viewReport(${i.id})"><span class="pill" style="background:${col}">SEV-${s}</span>
          <b>#${i.id}</b> <span style="color:#94a3b8">${i.service}</span>
          <span style="margin-left:auto;color:#64748b;font-size:12px">${new Date(i.created_at).toLocaleString()}</span>
          <button class="ghost" style="padding:4px 9px;font-size:12px" onclick="event.stopPropagation();deleteIncident(${i.id})">🗑️</button></div>`;
      }).join("")||'<p class="hint">No analyses yet.</p>';
    }
    async function viewReport(id){
      const res=await fetch(`/incidents/${id}/report`,{headers:{"Authorization":"Bearer "+token}});
      if(!res.ok){toast("No saved report for this one yet.");return;}
      steps.style.display="none"; render(await res.json()); window.scrollTo({top:0,behavior:"smooth"});
    }

    // elements
    const login_=document.getElementById("login"), email=document.getElementById("email"), password=document.getElementById("password");
    const loginErr=document.getElementById("loginErr"), app=document.getElementById("app"), service=document.getElementById("service");
    const goBtn=document.getElementById("goBtn"), steps=document.getElementById("steps"), result=document.getElementById("result");
    const hlist=document.getElementById("hlist"), topbar=document.getElementById("topbar"), toasts=document.getElementById("toasts");
    const filein=document.getElementById("filein"), logsEl=document.getElementById("logs");

    // file upload
    filein.addEventListener("change", e=>{ const f=e.target.files[0]; if(!f)return;
      f.text().then(t=>{ logsEl.value=t; toast("📎 Loaded "+f.name); }); });
    // drag & drop
    logsEl.addEventListener("dragover", e=>{ e.preventDefault(); logsEl.classList.add("drop"); });
    logsEl.addEventListener("dragleave", ()=>logsEl.classList.remove("drop"));
    logsEl.addEventListener("drop", e=>{ e.preventDefault(); logsEl.classList.remove("drop");
      const f=e.dataTransfer.files[0]; if(f) f.text().then(t=>{ logsEl.value=t; toast("📎 Loaded "+f.name); }); });
    // keyboard shortcut
    document.addEventListener("keydown", e=>{ if((e.metaKey||e.ctrlKey)&&e.key==="Enter"&&app.style.display!=="none") analyze(); });

    if(localStorage.getItem("theme")==="light") document.body.classList.add("light");
    if(token) showApp();
  </script>
</body>
</html>
