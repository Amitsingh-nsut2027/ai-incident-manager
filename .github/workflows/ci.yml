name: CI

# WHEN to run: on pushes to main and on every pull request.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ---- Job 1: run the test suite ----
  test:
    runs-on: ubuntu-latest
    env:
      # Dummy values so config loads. Tests use an in-memory SQLite DB (via the
      # get_db override) and mock the LLM, so no real Postgres/Ollama is needed.
      DATABASE_URL: postgresql+psycopg://user:pass@localhost:5432/test
      SECRET_KEY: ci-test-secret
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest

  # ---- Job 2: build the Docker image (only if tests pass) ----
  docker-build:
    needs: test          # waits for the 'test' job to succeed
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Build the Docker image
        run: docker build -t incident-manager:ci .
